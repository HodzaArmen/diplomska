<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distributor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-page" data-role-emoji="📦">
    <nav class="navbar">
        <div class="navbar-container">
            <h1 class="navbar-title">📦 Distributor</h1>
            <div class="navbar-right">
                <span id="wallet-status" class="wallet-status"></span>
                <button id="btn-profile" class="btn-logout" type="button">Profil</button>
                <button id="btn-back-home" class="btn-logout" type="button">Odjava</button>
            </div>
        </div>
    </nav>

    <main class="container dashboard-layout">
        <section id="medicine-detail-panel" class="detail-host" style="display:none;" aria-live="polite"></section>

        <section class="dashboard-card">
            <header class="card-header">
                <h2>Prihajajoče pošiljke</h2>
            </header>
            <div id="incoming-deliveries-list" class="card-body table-wrap"><p class="text-muted">Nalagam…</p></div>
        </section>

        <section class="dashboard-card">
            <header class="card-header"><h2>Moj inventar</h2></header>
            <div id="my-inventory-list" class="card-body table-wrap"><p class="text-muted">Nalagam…</p></div>
        </section>

        <section id="forward-send-section" class="dashboard-card" style="display:none;">
            <header class="card-header">
                <h2>Pošlji v lekarno</h2>
            </header>
            <div class="card-body form-row">
                <div class="form-group"><label for="forward-medicine">Zdravilo</label><select id="forward-medicine" class="form-control"><option value="">— Izberite zdravilo —</option></select></div>
                <div class="form-group"><label for="forward-quantity">Količina</label><input type="number" id="forward-quantity" class="form-control" min="1" value="1"></div>
                <div class="form-group"><label for="target-pharmacy">Lekarna</label><select id="target-pharmacy" class="form-control"><option value="">— Izberite lekarno —</option></select></div>
            </div>
            <div class="card-body card-body-actions">
                <button id="btn-send-forward" class="btn btn-primary" type="button">Pošlji</button>
                <p id="forward-error" class="error-message" style="display:none;"></p>
                <p id="forward-success" class="success-message" style="display:none;"></p>
            </div>
        </section>

        <section class="dashboard-card">
            <header class="card-header"><h2>Zgodovina pošiljk</h2></header>
            <div id="shipment-history-list" class="card-body table-wrap"><p class="text-muted">Nalagam…</p></div>
        </section>
    </main>

    <footer class="footer"><p>Distributor · Sledljivost zdravil</p></footer>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.11.1/dist/ethers.umd.min.js"></script>
    <script src="auth-utils.js"></script>
    <script src="blockchain-metamask.js"></script>
    <script src="shared-utils.js"></script>
    <script src="send-shipment.js"></script>
    <script src="dashboard-common.js"></script>
    <script src="profile-panel.js"></script>
    <script src="medicine-detail.js"></script>
    <script src="dashboard-distributor.js"></script>
</body>
</html>

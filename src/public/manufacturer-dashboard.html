<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proizvajalec</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-page">
    <nav class="navbar">
        <div class="navbar-container">
            <h1 class="navbar-title">🏭 Proizvajalec</h1>
            <div class="navbar-right">
                <span id="wallet-status" class="wallet-status"></span>
                <button id="btn-back-home" class="btn-logout" type="button">Odjava</button>
            </div>
        </div>
    </nav>

    <main class="container dashboard-layout">
        <section id="medicine-detail-panel" class="detail-host" style="display:none;" aria-live="polite"></section>

        <section class="dashboard-card">
            <header class="card-header">
                <h2>Ustvari zdravilo</h2>
                <p class="card-desc">VC (issuer-api) → IPFS (Pinata) → blockchain (Sepolia). <a href="/api/system/status" target="_blank" rel="noopener">Status storitev</a></p>
            </header>
            <div class="card-body">
                <div class="form-group">
                    <label for="medicine-selection">Predloga</label>
                    <select id="medicine-selection" class="form-control"><option value="">— Izberi ali custom —</option></select>
                </div>
                <div class="form-group" id="custom-medicine-group" style="display:none;">
                    <label for="custom-medicine-name">Ime</label>
                    <input type="text" id="custom-medicine-name" class="form-control" placeholder="npr. Aspirin 500mg">
                </div>
                <div class="form-row">
                    <div class="form-group"><label for="batch-number">Serija</label><input type="text" id="batch-number" class="form-control"></div>
                    <div class="form-group"><label for="quantity">Količina</label><input type="number" id="quantity" class="form-control" min="1"></div>
                    <div class="form-group"><label for="expiry-date">Rok</label><input type="date" id="expiry-date" class="form-control"></div>
                </div>
                <div class="form-group"><label for="description">Opis</label><textarea id="description" class="form-control" rows="2"></textarea></div>
                <button id="btn-create-medicine" class="btn btn-primary" type="button">Ustvari zdravilo</button>
                <p id="create-error" class="error-message" style="display:none;"></p>
                <p id="create-success" class="success-message" style="display:none;"></p>
            </div>
        </section>

        <section class="dashboard-card">
            <header class="card-header">
                <h2>Pošlji distributorju</h2>
                <p class="card-desc">Pošljete lahko samo količino, ki je še na zalogi.</p>
            </header>
            <div class="card-body form-row">
                <div class="form-group"><label for="delivery-medicine">Zdravilo</label><select id="delivery-medicine" class="form-control"></select></div>
                <div class="form-group"><label for="delivery-quantity">Količina</label><input type="number" id="delivery-quantity" class="form-control" min="1" value="1"></div>
                <div class="form-group"><label for="target-distributor">Distributor</label><select id="target-distributor" class="form-control"></select></div>
            </div>
            <div class="card-body card-body-actions">
                <button id="btn-send-delivery" class="btn btn-primary" type="button">Pošlji</button>
                <p id="delivery-error" class="error-message" style="display:none;"></p>
                <p id="delivery-success" class="success-message" style="display:none;"></p>
            </div>
        </section>

        <section class="dashboard-card">
            <header class="card-header"><h2>Moja zdravila</h2></header>
            <div id="medicines-list" class="card-body table-wrap"><p class="text-muted">Nalagam…</p></div>
        </section>
    </main>

    <footer class="footer"><p>Proizvajalec · Sledljivost zdravil</p></footer>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.11.1/dist/ethers.umd.min.js"></script>
    <script src="auth-utils.js"></script>
    <script src="blockchain-metamask.js"></script>
    <script src="shared-utils.js"></script>
    <script src="dashboard-common.js"></script>
    <script src="medicine-detail.js"></script>
    <script src="dashboard-manufacturer.js"></script>
</body>
</html>
